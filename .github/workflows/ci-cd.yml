name: CI / CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.0"
          cache: true

      - name: Check code style (gofmt)
        run: test -z "$(gofmt -l .)"

      - name: Build
        run: |
          go build ./lesson01/numbers/main.go
          go build ./lesson01/strings/main.go ./lesson01/strings/byte_level.go

      - name: Test
        run: |
          go test ./lesson01/numbers/main.go
          go test ./lesson01/strings/byte_level.go ./lesson01/strings/byte_level_test.go
